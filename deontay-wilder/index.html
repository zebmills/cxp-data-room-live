:root{--bk:#0b0b0c;--bk2:#121215;--wh:#fff;--bl:#1F6BFF;--gy:#8a8a8a;--gy2:#b5b5b5;--ln:#26262a}

function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function keyFromPassword(password){
  const material = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(payload.salt),iterations:payload.iterations,hash:"SHA-256"}, material, {name:"AES-GCM",length:256}, false, ["decrypt"]);
}
async function unlock(password){
  const key = await keyFromPassword(password);
  const data = new Uint8Array([...b64(payload.ciphertext), ...b64(payload.tag)]);
  const plain = await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(payload.iv),tagLength:128}, key, data);
  const html = new TextDecoder().decode(plain);
  document.open();
  document.write(html);
  document.close();
}
document.getElementById("gateForm").addEventListener("submit", async function(event){
  event.preventDefault();
  const err = document.getElementById("err");
  err.style.display = "none";
  if (!document.getElementById("nda").checked) { err.style.display = "block"; return; }
  document.getElementById("submit").disabled = true;
  try { await unlock(document.getElementById("password").value.trim()); }
  catch (error) { document.getElementById("submit").disabled = false; err.style.display = "block"; }
});
</script>
