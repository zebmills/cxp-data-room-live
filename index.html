<title>CXP Sport - Data Room</title>
<style>
:root{--bk:#0b0b0c;--bk2:#121215;--wh:#fff;--bl:#1F6BFF;--gy:#8a8a8a;--gy2:#b5b5b5;--ln:#26262a}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bk);color:var(--wh);font-family:Arial,Helvetica,sans-serif}
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}
.box{width:min(420px,100%);text-align:left}.mark{width:130px;height:52px;display:flex;align-items:center;justify-content:center;margin-bottom:34px;border:1px solid var(--ln);font-weight:700;letter-spacing:5px}
h1{margin:0 0 6px;font-size:26px;letter-spacing:.5px}p{margin:0 0 26px;color:var(--gy);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:13px}
input[type=password]{width:100%;margin-bottom:14px;padding:13px 15px;border:1px solid var(--ln);border-radius:4px;background:var(--bk2);color:var(--wh);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:14px;letter-spacing:2px}
label{display:flex;gap:9px;align-items:flex-start;margin-bottom:20px;color:var(--gy2);font-size:12px;line-height:1.45;cursor:pointer}
button{width:100%;padding:13px;border:0;border-radius:4px;background:var(--bl);color:var(--wh);font:inherit;font-weight:700;letter-spacing:2px;cursor:pointer}
.err{display:none;margin-top:10px;color:#ff5a5a;font-size:12px}.foot{margin-top:30px;color:#555;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:10px;letter-spacing:1px}
</style>

function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function keyFromPassword(password){
  const material = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(payload.salt),iterations:payload.iterations,hash:"SHA-256"}, material, {name:"AES-GCM",length:256}, false, ["decrypt"]);
}
async function unlock(password){
  const key = await keyFromPassword(password);
  const data = new Uint8Array([...b64(payload.ciphertext), ...b64(payload.tag)]);
  const plain = await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(payload.iv),tagLength:128}, key, data);
  const html = new TextDecoder().decode(plain);
  document.open();
  document.write(html);
  document.close();
}
document.getElementById("gateForm").addEventListener("submit", async function(event){
  event.preventDefault();
  const err = document.getElementById("err");
  err.style.display = "none";
  if (!document.getElementById("nda").checked) { err.style.display = "block"; return; }
  document.getElementById("submit").disabled = true;
  try { await unlock(document.getElementById("password").value.trim()); }
  catch (error) { document.getElementById("submit").disabled = false; err.style.display = "block"; }
});
